name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:coverage

      - name: Build package
        run: npm run build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run changeset:publish
          version: npm run changeset:version
          title: 'chore: version packages'
          commit: 'chore: version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        run: |
          set -o pipefail

          node --input-type=module <<'NODE' | gh release create "v${RELEASE_VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Release v${RELEASE_VERSION}" \
            --notes-file - \
            --generate-notes
          import { readFileSync } from 'node:fs';

          const lines = readFileSync('CHANGELOG.md', 'utf8').split(/\r?\n/);
          const heading = `## ${process.env.RELEASE_VERSION}`;
          const start = lines.indexOf(heading);

          if (start === -1) {
            throw new Error(`Missing ${heading} section in CHANGELOG.md`);
          }

          const nextHeading = lines.findIndex(
            (line, index) => index > start && line.startsWith('## '),
          );
          const notes = lines
            .slice(start + 1, nextHeading === -1 ? undefined : nextHeading)
            .join('\n')
            .trim();

          if (!notes) {
            throw new Error(`Empty ${heading} section in CHANGELOG.md`);
          }

          process.stdout.write(`${notes}\n`);
          NODE
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_VERSION: ${{ fromJson(steps.changesets.outputs.publishedPackages)[0].version }}
